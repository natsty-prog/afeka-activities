<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חידון נגזרות | מתמטיקה</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap');
  :root { --bg:#f5f7f6; --s:#fff; --b:#e2e8e4; --green:#1fa85c; --dark:#343a41; --muted:#7a8a80; --red:#e74c3c; --yellow:#f39c12; --radius:14px; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--dark); font-family:'Heebo',sans-serif; min-height:100vh; padding:24px 16px; }
  header { text-align:center; margin-bottom:28px; }
  header h1 { font-size:1.6rem; font-weight:900; color:var(--dark); margin-bottom:4px; }
  header p { color:var(--muted); font-size:0.88rem; }
  .progress-bar-wrap { max-width:600px; margin:0 auto 28px; }
  .progress-meta { display:flex; justify-content:space-between; font-size:0.8rem; color:var(--muted); margin-bottom:6px; font-weight:600; }
  .progress-bg { height:8px; background:var(--b); border-radius:20px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--green); border-radius:20px; transition:width .4s; }
  .quiz-box { max-width:600px; margin:0 auto; background:var(--s); border:1.5px solid var(--b); border-radius:var(--radius); padding:28px; }
  .q-num { font-size:0.7rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
  .q-text { font-size:1.4rem; font-weight:800; color:var(--dark); margin-bottom:6px; text-align:center; font-family:monospace; }
  .q-hint { font-size:0.82rem; color:var(--muted); text-align:center; margin-bottom:24px; }
  .options { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .opt-btn {
    padding:14px 12px; border-radius:10px; border:1.5px solid var(--b); background:var(--bg);
    font-size:1.0rem; font-family:monospace; font-weight:700; color:var(--dark);
    cursor:pointer; transition:all .18s; text-align:center;
  }
  .opt-btn:hover:not(:disabled) { border-color:var(--green); background:rgba(31,168,92,.07); color:var(--green); }
  .opt-btn.correct { background:rgba(31,168,92,.12); border-color:var(--green); color:var(--green); }
  .opt-btn.wrong   { background:rgba(231,76,60,.08); border-color:var(--red); color:var(--red); }
  .opt-btn.reveal  { background:rgba(31,168,92,.06); border-color:var(--green); color:var(--green); opacity:.6; }
  .feedback { margin-top:18px; padding:14px 16px; border-radius:10px; font-size:0.88rem; line-height:1.6; }
  .feedback.correct { background:rgba(31,168,92,.1); border:1px solid rgba(31,168,92,.3); color:#155e3a; }
  .feedback.wrong   { background:rgba(231,76,60,.08); border:1px solid rgba(231,76,60,.2); color:#922b21; }
  .next-btn { display:block; width:100%; margin-top:14px; padding:12px; border-radius:10px; border:none; background:var(--green); color:#fff; font-family:'Heebo',sans-serif; font-size:0.92rem; font-weight:700; cursor:pointer; }
  .score-box { text-align:center; }
  .score-num { font-size:3.5rem; font-weight:900; color:var(--green); line-height:1; margin:16px 0 8px; }
  .score-label { font-size:1.0rem; color:var(--muted); margin-bottom:24px; }
  .restart-btn { padding:12px 28px; border-radius:10px; border:none; background:var(--green); color:#fff; font-family:'Heebo',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; }
  .stats-row { display:flex; justify-content:center; gap:28px; margin:20px 0; }
  .stat { text-align:center; }
  .stat .n { font-size:1.6rem; font-weight:800; line-height:1; }
  .stat .l { font-size:0.72rem; color:var(--muted); margin-top:2px; }
</style>
</head>
<body>
<header>
  <h1>∂ חידון חוקי נגזרות</h1>
  <p>מתמטיקה | בחן את עצמך — מה הנגזרת של כל פונקציה?</p>
</header>

<div class="progress-bar-wrap">
  <div class="progress-meta">
    <span id="q-progress">שאלה 1 מתוך 10</span>
    <span id="score-live">ניקוד: 0</span>
  </div>
  <div class="progress-bg"><div class="progress-fill" id="prog-fill" style="width:10%"></div></div>
</div>

<div class="quiz-box" id="quiz-box"></div>

<script>
const allQuestions = [
  { q:'d/dx [xⁿ]', a:'nxⁿ⁻¹', opts:['nxⁿ⁻¹','xⁿ⁺¹','n·xⁿ','n/(x+1)'], hint:'חוק הנגזרת הכללי', explain:'חוק החזקה: d/dx[xⁿ] = n·xⁿ⁻¹. לדוגמה: d/dx[x³] = 3x²' },
  { q:'d/dx [sin x]', a:'cos x', opts:['cos x','-cos x','sin x','-sin x'], hint:'פונקציה טריגונומטרית', explain:'הנגזרת של sin היא cos. שים לב — הנגזרת של cos היא -sin (שלילי!)' },
  { q:'d/dx [cos x]', a:'-sin x', opts:['sin x','-sin x','cos x','-cos x'], hint:'פונקציה טריגונומטרית', explain:'הנגזרת של cos היא -sin x. הסימן השלילי חשוב!' },
  { q:'d/dx [eˣ]', a:'eˣ', opts:['eˣ','xeˣ⁻¹','e·x','1/eˣ'], hint:'הפונקציה האקספוננציאלית', explain:'הפונקציה eˣ היא הפונקציה היחידה שנגזרתה שווה לעצמה!' },
  { q:'d/dx [ln x]', a:'1/x', opts:['1/x','ln x','x·ln x','1/ln x'], hint:'פונקציה לוגריתמית', explain:'הנגזרת של ln x היא 1/x, מוגדרת רק עבור x > 0.' },
  { q:'d/dx [x²]', a:'2x', opts:['2x','x²','2','x'], hint:'חוק החזקה n=2', explain:'לפי חוק החזקה: d/dx[x²] = 2x¹ = 2x' },
  { q:'d/dx [7]', a:'0', opts:['0','7','1','7x'], hint:'נגזרת של קבוע', explain:'נגזרת של כל קבוע היא 0 — קבוע לא משתנה, אין שינוי.' },
  { q:'d/dx [tan x]', a:'sec²x', opts:['sec²x','cos²x','1/sin²x','tan²x'], hint:'פונקציה טריגונומטרית', explain:'הנגזרת של tan x היא sec²x = 1/cos²x.' },
  { q:'d/dx [√x]', a:'1/(2√x)', opts:['1/(2√x)','2√x','√x/2','1/√x'], hint:'√x = x^(1/2)', explain:'√x = x^(1/2), לכן הנגזרת = (1/2)x^(-1/2) = 1/(2√x)' },
  { q:'d/dx [3x³ + 2x]', a:'9x² + 2', opts:['9x² + 2','3x² + 2','x³ + x','6x + 2'], hint:'חוק הסכום + חוק החזקה', explain:'נגזרים איבר איבר: d/dx[3x³]=9x², d/dx[2x]=2. סה"כ 9x²+2.' },
];

// Shuffle
function shuffle(arr) { return [...arr].sort(()=>Math.random()-.5); }

let questions = shuffle(allQuestions).slice(0,10);
let current = 0, score = 0, answered = false;

function render() {
  const box = document.getElementById('quiz-box');
  if (current >= questions.length) {
    const pct = Math.round(score/questions.length*100);
    const emoji = pct===100?'🏆':pct>=80?'🎉':pct>=60?'👍':'📚';
    box.innerHTML = `<div class="score-box">
      <div style="font-size:3rem">${emoji}</div>
      <div class="score-num">${score}/${questions.length}</div>
      <div class="score-label">${pct >= 80 ? 'מצוין! שלטת בחומר' : pct >= 60 ? 'כמעט! כדאי לחזור על הנוסחאות' : 'כדאי לחזור על חוקי הנגזרות'}</div>
      <div class="stats-row">
        <div class="stat"><div class="n" style="color:var(--green)">${score}</div><div class="l">נכון</div></div>
        <div class="stat"><div class="n" style="color:var(--red)">${questions.length-score}</div><div class="l">שגוי</div></div>
        <div class="stat"><div class="n" style="color:var(--dark)">${pct}%</div><div class="l">ציון</div></div>
      </div>
      <button class="restart-btn" onclick="restart()">↺ התחל מחדש</button>
    </div>`;
    return;
  }
  const q = questions[current];
  document.getElementById('q-progress').textContent = `שאלה ${current+1} מתוך ${questions.length}`;
  document.getElementById('score-live').textContent = `ניקוד: ${score}`;
  document.getElementById('prog-fill').style.width = ((current+1)/questions.length*100)+'%';
  const opts = shuffle(q.opts);
  box.innerHTML = `<div class="q-num">שאלה ${current+1} מתוך ${questions.length}</div>
    <div class="q-text">${q.q} = ?</div>
    <div class="q-hint">💡 רמז: ${q.hint}</div>
    <div class="options">
      ${opts.map(o=>`<button class="opt-btn" onclick="answer('${o}')">${o}</button>`).join('')}
    </div>
    <div id="feedback" style="display:none"></div>`;
  answered = false;
}

function answer(chosen) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const correct = chosen === q.a;
  if (correct) score++;
  document.querySelectorAll('.opt-btn').forEach(btn => {
    btn.disabled = true;
    if (btn.textContent === q.a) btn.classList.add(correct ? 'correct' : 'reveal');
    else if (btn.textContent === chosen && !correct) btn.classList.add('wrong');
  });
  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  fb.className = 'feedback ' + (correct ? 'correct' : 'wrong');
  fb.innerHTML = `${correct ? '✓ נכון!' : '✗ לא נכון.'} ${q.explain}
    <button class="next-btn" onclick="next()">${current+1 < questions.length ? 'השאלה הבאה ←' : 'ראה תוצאות'}</button>`;
}

function next() { current++; render(); }
function restart() { questions = shuffle(allQuestions).slice(0,10); current=0; score=0; render(); }
render();
</script>
</body>
</html>
